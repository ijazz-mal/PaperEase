<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaperEase</title>
    <!-- switched to proper fonts, georgia wasn't cutting it -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="brand">Paper<span>Ease</span></div>
      <p class="brand-sub">Research papers, explained simply.</p>
    </header>

    <section class="hero-section">
      <h1>Understand any research paper,<br /><em>instantly.</em></h1>
      <p class="hero-sub">
        Type a topic below. We'll fetch real academic papers and explain them in
        plain English.
      </p>

      <div class="search-wrapper">
        <input
          type="text"
          id="searchBox"
          placeholder="e.g. climate change in Africa, machine learning in healthcare..."
        />
        <button id="searchBtn">Search Papers</button>
      </div>

      <p id="errorText" class="error-msg"></p>
    </section>

    <section id="filterBar" class="filter-bar hidden">
      <div class="filter-item">
        <label for="yearFrom">Year from:</label>
        <input
          type="number"
          id="yearFrom"
          placeholder="e.g. 2015"
          min="1900"
          max="2025"
        />
      </div>
      <div class="filter-item">
        <label for="sortBy">Sort by:</label>
        <select id="sortBy">
          <option value="relevance">Relevance</option>
          <option value="newest">Year (Newest)</option>
          <option value="oldest">Year (Oldest)</option>
          <option value="citations">Most Cited</option>
        </select>
      </div>
      <p id="paperCount" class="paper-count"></p>
    </section>

    <main id="paperList" class="paper-list"></main>

    <div id="loadingSpinner" class="loading-spinner hidden">
      <div class="spinner-ring"></div>
      <p>Fetching papers...</p>
    </div>

    <!-- popup for the AI summary -->
    <div id="summaryModal" class="modal-bg hidden">
      <div class="modal-content">
        <button id="closeModal" class="close-btn">&#x2715;</button>
        <h2 id="modalPaperTitle"></h2>
        <span id="modalTag" class="modal-tag"></span>
        <div id="modalSummaryText" class="summary-text"></div>
      </div>
    </div>

    <footer class="site-footer">
      <p>
        Data from
        <a href="https://api.semanticscholar.org/" target="_blank"
          >Semantic Scholar</a
        >. Summaries powered by
        <a href="https://groq.com" target="_blank">Groq (Llama 3)</a>.
      </p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
