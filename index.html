<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>PaperEase</title>
  </head>
  <body>
    <header>
      <h1>PaperEase</h1>
      <p>Research papers, explained simply.</p>
    </header>

    <main>
      <input type="text" id="searchBox" placeholder="Search for a topic..." />
      <button id="searchBtn">Search</button>
      <div id="filterBar">
        <label
          >Year from: <input type="number" id="yearFrom" placeholder="2015"
        /></label>
        <label
          >Sort by:
          <select id="sortBy">
            <option value="relevance">Relevance</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="citations">Most Cited</option>
          </select>
        </label>
        <span id="paperCount"></span>
      </div>

      <div id="loadingSpinner">Loading...</div>
      <p id="errorText"></p>
      <div id="paperList"></div>
    </main>

    <footer>
      <p>Powered by Semantic Scholar</p>
    </footer>
    <!-- popup that shows the AI summary -->
    <div
      id="summaryModal"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
      "
    >
      <div
        style="
          background: white;
          padding: 30px;
          max-width: 600px;
          width: 100%;
          max-height: 80vh;
          overflow-y: auto;
          border-radius: 6px;
          position: relative;
        "
      >
        <button
          id="closeModal"
          style="
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
          "
        >
          &#x2715;
        </button>
        <h2 id="modalPaperTitle" style="margin-bottom: 10px"></h2>
        <span
          id="modalTag"
          style="
            background: #2c6e49;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
          "
        ></span>
        <div
          id="modalSummaryText"
          style="
            margin-top: 15px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
          "
        ></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="app.js"></script>
  </body>
</html>
