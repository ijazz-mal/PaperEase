server {
    listen 80;
    root /var/www/html;
    index index.html;

    # serve static files normally
    location / {
        try_files $uri $uri/ =404;
    }

    # custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # proxy /papers to Semantic Scholar
    location /papers {
        proxy_pass https://api.semanticscholar.org/graph/v1/paper/search$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host api.semanticscholar.org;
        proxy_set_header x-api-key "SEMANTIC_SCHOLAR_KEY";
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # proxy /summarise to Groq - key stays on server, never exposed to browser
    location /summarise {
        proxy_pass https://api.groq.com/openai/v1/chat/completions;
        proxy_ssl_server_name on;
        proxy_pass_request_body on;
        proxy_set_header Host api.groq.com;
        proxy_set_header Authorization "GROQ_KEY_HERE";
        proxy_set_header Content-Type "application/json";
        proxy_set_header Accept-Encoding "";
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers "Content-Type";
        add_header Access-Control-Allow-Methods "POST, OPTIONS";

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            return 204;
        }
    }
}